<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contatti - Beauty&Co</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__container">
      <a class="header__logo" href="../index.html">Beauty&Co</a>

      <nav class="header__nav">
        <a class="header__link" href="../index.html">Home</a>
        <a class="header__link" href="catalogo.html">Catalogo</a>
        <a class="header__link" href="chi-siamo.html">Chi siamo</a>
       </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="contatti">
    <div class="contatti__container">

      <h1 class="contatti__title">Contattaci</h1>

      <p class="contatti__intro">
        Hai domande sui nostri prodotti? Scrivici, saremo felici di aiutarti!
      </p>

      <div class="contatti__info">
        <p><strong>Email:</strong> info@beautyco.it</p>
        <p><strong>Telefono:</strong> +39 123 456 7890</p>
      </div>

      <form class="contatti__form">
        <label class="contatti__label">
          Nome
          <input type="text" class="contatti__input" required>
        </label>

        <label class="contatti__label">
          Email
          <input type="email" class="contatti__input" required>
        </label>

        <label class="contatti__label">
          Messaggio
          <textarea class="contatti__textarea" rows="4" required></textarea>
        </label>

        <button type="submit" class="contatti__button">
          Invia
        </button>
      </form>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p class="footer__text">© 2026 Beauty&Co</p>
  </footer>

</body>
</html>
